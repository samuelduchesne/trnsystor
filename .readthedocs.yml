# Read the Docs configuration file for Zensical
# See https://docs.readthedocs.com/platform/latest/intro/zensical.html

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.13"
  jobs:
    install:
      - pip install .[docs]
    build:
      html:
        - zensical build
    post_build:
      - mkdir -p $READTHEDOCS_OUTPUT/html/
      - cp --recursive site/* $READTHEDOCS_OUTPUT/html/

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs
