site_name: trnsystor
site_url: https://trnsystor.readthedocs.io/
site_description: A python TRNSYS type parser
site_author: Samuel Letellier-Duchesne
repo_url: https://github.com/samuelduchesne/trnsystor
repo_name: samuelduchesne/trnsystor

nav:
  - Home: index.md
  - API Reference: reference.md

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand
    - search.highlight
    - search.suggest

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.snippets:
      base_path: ["."]
      check_paths: true
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            docstring_style: numpy
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            inherited_members: true
            members_order: source
            summary: true
            show_signature_annotations: true
          inventories:
            - https://docs.python.org/3/objects.inv
            - https://pandas.pydata.org/pandas-docs/stable/objects.inv
            - https://numpy.org/doc/stable/objects.inv
            - https://networkx.org/documentation/stable/objects.inv
            - https://pint.readthedocs.io/en/stable/objects.inv
            - https://docs.sympy.org/latest/objects.inv
